server {
    server_name broadwaypixels.com www.broadwaypixels.com 45.55.81.45;

    client_max_body_size 32k;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    listen [::]:443 ssl ipv6only=on;
    ssl_certificate /etc/letsencrypt/live/broadwaypixels.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/broadwaypixels.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name broadwaypixels.com www.broadwaypixels.com 45.55.81.45;

    return 301 https://$host$request_uri;
}
